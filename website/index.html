<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>tavrn.sh</title>
  <meta name="description" content="tavrn.sh — terminal tavern over SSH. Chat, music, games.">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="sky" aria-hidden="true"></div>
  <main class="shell">
    <p class="eyebrow">tavrn.sh</p>
    <h1>A terminal tavern over SSH</h1>
    <p class="lede">
      Chat, listen to music, and play games with strangers — right from your terminal.
    </p>
    <div class="cta">
      <code>ssh tavrn.sh</code>
    </div>
    <div id="radio" class="radio hidden">
      <button id="play-btn" class="play-btn" aria-label="Play tavern radio">&#9654; Listen Live</button>
      <div id="now-playing" class="now-playing"></div>
    </div>
    <p class="status" id="status-line">pull up a chair &bull; warm lights &bull; low music</p>
  </main>
  <audio id="audio" preload="none"></audio>
  <script src="./app.js"></script>
</body>
</html>
